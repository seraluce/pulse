<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111128"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="title-primary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="title-secondary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="blur-xl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
    <filter id="blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur-md" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 深色渐变背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 光晕 -->
  <g filter="url(#blur-xl)">
    <circle cx="150" cy="150" r="350" fill="#3b82f6" opacity="0.15"/>
    <circle cx="1050" cy="480" r="380" fill="#8b5cf6" opacity="0.12"/>
    <circle cx="600" cy="315" r="300" fill="#06b6d4" opacity="0.06"/>
  </g>

  <g filter="url(#blur-lg)">
    <circle cx="300" cy="200" r="200" fill="#3b82f6" opacity="0.1"/>
    <circle cx="900" cy="450" r="220" fill="#8b5cf6" opacity="0.08"/>
  </g>

  <!-- 左侧品牌色装饰条 -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent-bar)"/>

  <!-- 顶部品牌色标 -->
  <rect x="60" y="70" width="48" height="4" rx="2" fill="#3b82f6"/>
  <rect x="60" y="78" width="24" height="4" rx="2" fill="#8b5cf6" opacity="0.6"/>

  <!-- 品牌标识 -->
  <rect x="60" y="100" width="36" height="36" rx="8" fill="url(#accent-bar)" opacity="0.15"/>
  <rect x="66" y="106" width="24" height="24" rx="5" fill="#3b82f6" opacity="0.8"/>
  <text x="108" y="126" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="18" font-weight="600" fill="#e0e7ff" letter-spacing="0.02em">Grateful Group</text>

  <!-- 主标题 -->
  <text x="60" y="290" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="72" font-weight="700" fill="url(#title-primary)" letter-spacing="-0.03em">赋能企业</text>
  <text x="60" y="378" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="72" font-weight="700" fill="url(#title-secondary)" letter-spacing="-0.03em">持续增长</text>

  <!-- 副标题 -->
  <text x="60" y="440" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="18" fill="#6b7280" letter-spacing="0.05em">专业企业服务平台</text>

  <!-- 服务标签 -->
  <g>
    <rect x="60" y="468" width="64" height="26" rx="13" fill="#ffffff" fill-opacity="0.06"/>
    <text x="92" y="485" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">战略咨询</text>
    <rect x="134" y="468" width="64" height="26" rx="13" fill="#ffffff" fill-opacity="0.06"/>
    <text x="166" y="485" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">数字化转型</text>
    <rect x="208" y="468" width="64" height="26" rx="13" fill="#ffffff" fill-opacity="0.06"/>
    <text x="240" y="485" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">品牌建设</text>
    <rect x="282" y="468" width="64" height="26" rx="13" fill="#ffffff" fill-opacity="0.06"/>
    <text x="314" y="485" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">数据驱动</text>
  </g>

  <!-- 底部渐变分隔线 -->
  <rect x="60" y="540" width="400" height="1" fill="url(#divider)"/>

  <!-- 底部信息 -->
  <text x="60" y="575" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="13" fill="#4b5563">gratefulgroup.com</text>
  <text x="1140" y="575" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="13" fill="#4b5563" text-anchor="end">企业增长伙伴</text>

  <!-- ============== 右侧区域 ============== -->

  <!-- 右侧大号抽象圆形装饰 -->
  <g opacity="0.08">
    <circle cx="950" cy="315" r="200" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="950" cy="315" r="160" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="950" cy="315" r="120" fill="none" stroke="#06b6d4" stroke-width="0.5"/>
  </g>

  <!-- 数据可视化 - 柱状图装饰 -->
  <g opacity="0.15">
    <!-- 柱状图底座 -->
    <rect x="750" y="420" width="20" height="80" rx="3" fill="#3b82f6"/>
    <rect x="790" y="370" width="20" height="130" rx="3" fill="#3b82f6"/>
    <rect x="830" y="340" width="20" height="160" rx="3" fill="#8b5cf6"/>
    <rect x="870" y="300" width="20" height="200" rx="3" fill="#8b5cf6"/>
    <rect x="910" y="330" width="20" height="170" rx="3" fill="#06b6d4"/>
    <rect x="950" y="360" width="20" height="140" rx="3" fill="#06b6d4"/>
    <rect x="990" y="390" width="20" height="110" rx="3" fill="#3b82f6"/>
    <!-- 增长趋势线 -->
    <polyline points="765,420 835,340 905,300 975,360" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="765,420 835,340 905,300 975,360 1005,390" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- 右侧指标卡片 -->
  <g filter="url(#card-shadow)">
    <rect x="760" y="130" width="180" height="80" rx="12" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="850" y="164" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">500+</text>
    <text x="850" y="190" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">服务企业</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="970" y="130" width="180" height="80" rx="12" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="1060" y="164" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#8b5cf6" text-anchor="middle">98%</text>
    <text x="1060" y="190" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">客户满意度</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="760" y="230" width="180" height="80" rx="12" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="850" y="264" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="middle">10年</text>
    <text x="850" y="290" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">行业经验</text>
  </g>

  <!-- 右侧底部 - 小圆点装饰 -->
  <g opacity="0.1">
    <circle cx="760" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="776" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="792" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="808" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="824" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="840" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="856" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="872" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="888" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="904" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="920" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="936" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="952" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="968" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="984" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="1000" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="1016" cy="530" r="3" fill="#8b5cf6"/>
    <circle cx="1032" cy="530" r="3" fill="#06b6d4"/>
    <circle cx="1048" cy="530" r="3" fill="#3b82f6"/>
    <circle cx="1064" cy="530" r="3" fill="#8b5cf6"/>
  </g>
</svg>