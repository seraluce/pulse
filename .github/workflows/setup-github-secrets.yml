name: Setup GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API Token'
        required: true
      cloudflare_account_id:
        description: 'Cloudflare Account ID'
        required: true
      cloudflare_zone_id:
        description: 'Cloudflare Zone ID (optional)'
        required: false

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write
    steps:
      - name: Setup GitHub Secrets
        uses: actions/github-script@v7
        with:
          script: |
            const secrets = {
              'CLOUDFLARE_API_TOKEN': '${{ github.inputs.cloudflare_api_token }}',
              'CLOUDFLARE_ACCOUNT_ID': '${{ github.inputs.cloudflare_account_id }}'
            };

            if ('${{ github.inputs.cloudflare_zone_id }}') {
              secrets['CLOUDFLARE_ZONE_ID'] = '${{ github.inputs.cloudflare_zone_id }}';
            }

            for (const [name, value] of Object.entries(secrets)) {
              await core.setSecret(value, name);
              console.log(`✅ Added secret: ${name}`);
            }

            console.log('\n🎉 All secrets configured successfully!');
            console.log('🚀 Now you can push to main branch for automatic deployment.');
