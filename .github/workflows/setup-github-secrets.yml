name: Setup GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API Token'
        required: true
      cloudflare_account_id:
        description: 'Cloudflare Account ID'
        required: true
      cloudflare_zone_id:
        description: 'Cloudflare Zone ID (optional)'
        required: false

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub Secrets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "${{ github.event.inputs.cloudflare_api_token }}" | gh secret set "CLOUDFLARE_API_TOKEN" --repo "${{ github.repository }}"
          echo "${{ github.event.inputs.cloudflare_account_id }}" | gh secret set "CLOUDFLARE_ACCOUNT_ID" --repo "${{ github.repository }}"

          if [ -n "${{ github.event.inputs.cloudflare_zone_id }}" ]; then
            echo "${{ github.event.inputs.cloudflare_zone_id }}" | gh secret set "CLOUDFLARE_ZONE_ID" --repo "${{ github.repository }}"
          fi

          echo "🎉 All secrets configured successfully!"
